name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (flake8 — advisory)
        run: flake8 src config.py --max-line-length=120 --extend-ignore=E203,W503,E501,F401,F841,E702,E231,E302,E305 --exclude=src/5_dashboard.py || true
      - name: Format check (black — advisory)
        run: black --check --line-length=110 src config.py tests || true
      - name: Tests + coverage
        run: pytest tests/ --cov=src --cov=config --cov-report=term --cov-report=xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
